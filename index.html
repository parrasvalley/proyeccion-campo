<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Proyeccion de Campo - Parras Valley</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#060d08;color:#f0f4f0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;}

    /* HEADER */
    .hdr{background:linear-gradient(160deg,#071a0a 0%,#0e2e12 40%,#071a0a 100%);border-bottom:3px solid #22c55e;padding:18px 20px 0;position:sticky;top:0;z-index:100;box-shadow:0 4px 24px rgba(0,0,0,0.6);}
    .hdr-inner{max-width:960px;margin:0 auto;}
    .hdr-top{display:flex;align-items:center;gap:16px;margin-bottom:14px;}
    .hdr-logo{width:52px;height:52px;background:linear-gradient(135deg,#166534,#22c55e);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 4px 16px rgba(34,197,94,0.4);}
    .hdr-text h1{font-size:clamp(20px,5vw,30px);font-weight:900;color:#4ade80;letter-spacing:1px;line-height:1.1;}
    .hdr-text p{font-size:11px;color:#16a34a;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;margin-top:2px;}
    .tabs{display:flex;gap:0;border-top:1px solid rgba(34,197,94,0.15);margin-top:2px;}
    .tab{flex:1;padding:11px 8px;border:none;background:transparent;font-family:system-ui;font-size:11px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;color:#166534;border-bottom:3px solid transparent;transition:all 0.2s;}
    .tab.active{color:#4ade80;border-bottom:3px solid #4ade80;background:rgba(74,222,128,0.06);}

    /* WRAP */
    .wrap{max-width:960px;margin:0 auto;padding:20px 14px 80px;}

    /* SECCION */
    .sec{font-size:10px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:#4ade80;margin:22px 0 12px;display:flex;align-items:center;gap:10px;}
    .sec::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(74,222,128,0.5),transparent);}

    /* DIAS */
    .dias-grid{display:flex;gap:8px;margin-bottom:4px;overflow-x:auto;padding-bottom:6px;}
    .dia-btn{flex-shrink:0;min-width:80px;padding:10px 14px;border:2px solid rgba(74,222,128,0.2);border-radius:12px;background:rgba(255,255,255,0.02);font-family:system-ui;font-size:12px;font-weight:800;cursor:pointer;color:#4a7a54;transition:all 0.2s;text-align:center;}
    .dia-btn.active{background:linear-gradient(135deg,#14532d,#22c55e);border-color:#22c55e;color:#fff;box-shadow:0 4px 16px rgba(34,197,94,0.35);}
    .dia-btn.tiene{border-color:rgba(74,222,128,0.45);color:#4ade80;}
    .dia-btn-dot{display:block;width:6px;height:6px;border-radius:50%;background:#4ade80;margin:4px auto 0;}

    /* RANCHOS */
    .ranchos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:4px;}
    .rancho-btn{padding:14px 10px;border:2px solid rgba(255,255,255,0.08);border-radius:14px;background:rgba(255,255,255,0.02);font-family:system-ui;cursor:pointer;transition:all 0.2s;text-align:center;}
    .rancho-btn-icon{font-size:28px;margin-bottom:6px;display:block;}
    .rancho-btn-nombre{font-size:13px;font-weight:900;display:block;}
    .rancho-btn.active{box-shadow:0 6px 20px rgba(0,0,0,0.4);}

    /* PRODUCTO CARD */
    .prod-card{border-radius:16px;margin-bottom:12px;overflow:hidden;border:2px solid;}
    .prod-head{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;}
    .prod-head-left{display:flex;align-items:center;gap:12px;}
    .prod-icon{font-size:32px;line-height:1;}
    .prod-nombre{font-size:18px;font-weight:900;line-height:1.1;}
    .prod-sub{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;opacity:0.7;margin-top:2px;}
    .prod-rejas-badge{font-size:22px;font-weight:900;font-family:Georgia,serif;}
    .prod-body{padding:14px 18px;}

    /* INPUTS */
    .inp-label{font-size:9px;font-weight:900;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;display:block;opacity:0.7;}
    .inp{width:100%;border:2px solid rgba(255,255,255,0.12);border-radius:10px;padding:12px 14px;font-family:system-ui;font-size:20px;font-weight:900;background:rgba(0,0,0,0.4);color:#f0f4f0;outline:none;transition:all 0.2s;text-align:center;}
    .inp:focus{border-color:currentColor;background:rgba(0,0,0,0.6);}
    .inp::placeholder{font-size:15px;font-weight:400;opacity:0.3;}

    /* MORRON */
    .morron-item{border-radius:12px;padding:12px 14px;margin-bottom:8px;border:2px solid;}
    .morron-item-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
    .morron-color-nombre{font-size:16px;font-weight:900;}
    .del-btn{padding:5px 12px;border-radius:8px;border:1.5px solid rgba(239,83,80,0.4);background:rgba(239,83,80,0.1);color:#ef5350;font-size:11px;font-weight:700;cursor:pointer;font-family:system-ui;}
    .agregar-colors{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
    .add-color-btn{padding:8px 16px;border-radius:20px;border:2px solid;font-size:13px;font-weight:800;cursor:pointer;font-family:system-ui;background:rgba(0,0,0,0.3);transition:all 0.2s;}
    .add-color-btn:hover{transform:scale(1.05);}

    /* RESULTADO */
    .total-card{border-radius:14px;padding:16px 20px;margin:14px 0;display:flex;justify-content:space-between;align-items:center;border:2px solid rgba(74,222,128,0.3);background:rgba(74,222,128,0.06);}
    .total-label{font-size:12px;font-weight:800;color:#4ade80;letter-spacing:1px;text-transform:uppercase;}
    .total-val{font-size:36px;font-weight:900;color:#4ade80;font-family:Georgia,serif;}
    .total-unit{font-size:14px;color:#4a7a54;margin-left:4px;}

    /* BTN GUARDAR */
    .btn-save{width:100%;padding:16px;background:linear-gradient(135deg,#14532d,#22c55e,#4ade80);border:none;border-radius:14px;font-family:system-ui;font-size:17px;font-weight:900;color:#052e16;cursor:pointer;letter-spacing:1px;box-shadow:0 6px 24px rgba(34,197,94,0.3);transition:all 0.2s;margin-top:4px;}
    .btn-save:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(34,197,94,0.4);}
    .saved-msg{text-align:center;padding:12px;font-size:14px;color:#4ade80;font-weight:800;margin-top:8px;letter-spacing:1px;}

    /* TABLA RESUMEN */
    .sem-tabla-wrap{overflow-x:auto;margin-bottom:20px;border-radius:12px;border:2px solid rgba(74,222,128,0.15);}
    .sem-tabla{width:100%;border-collapse:collapse;min-width:500px;font-size:12px;}
    .sem-tabla th{background:rgba(74,222,128,0.08);padding:8px 10px;text-align:center;font-size:9px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:#4ade80;border-bottom:1px solid rgba(74,222,128,0.15);}
    .sem-tabla th:first-child{text-align:left;width:130px;}
    .sem-tabla td{padding:9px 10px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.04);font-weight:700;}
    .sem-tabla td:first-child{text-align:left;font-size:13px;font-weight:800;}
    .sem-tabla tr:last-child td{border-bottom:none;}
    .sem-tabla tr:hover td{background:rgba(74,222,128,0.04);}
    .rancho-header td{background:rgba(74,222,128,0.06);font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase;padding:6px 10px;}

    @media(max-width:600px){
      .ranchos-grid{grid-template-columns:repeat(3,1fr);}
      .prod-nombre{font-size:16px;}
    }
    @media(min-width:768px){
      .ranchos-grid{grid-template-columns:repeat(3,1fr);max-width:400px;}
      .dias-grid{flex-wrap:wrap;}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
var useState=React.useState;
var useEffect=React.useEffect;

var FB="https://parrasvalley-default-rtdb.firebaseio.com/campo-proyeccion-v1.json";
var FB_SEM="https://parrasvalley-default-rtdb.firebaseio.com/campo-proy-semanas-v1.json";
var FB_AJU="https://parrasvalley-default-rtdb.firebaseio.com/campo-proy-ajustes-v1.json";
var FB_QCR="https://parrasvalley-default-rtdb.firebaseio.com/recibo-hist-v1.json";
function fbGet(url,cb){fetch(url).then(function(r){return r.json();}).then(cb).catch(function(){cb(null);});}
function fbPatch(url,v,cb){fetch(url,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)}).then(function(){if(cb)cb();}).catch(function(){if(cb)cb();});}
function fbSet(v){fetch(FB,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)}).catch(function(){});}

var PIN_MAESTRO="mall";
var PINS={pvt:"p01",f4h:"f03",crp:"c05"};

var RANCHOS=[
  {id:"pvt",nombre:"PVT",icon:"[P]",color:"#fbbf24",bg:"linear-gradient(135deg,#78350f,#d97706)",borde:"rgba(251,191,36,0.4)",prods:["Persa","Slicer"]},
  {id:"crp",nombre:"Cordillera",icon:"[C]",color:"#60a5fa",bg:"linear-gradient(135deg,#1e3a5f,#2563eb)",borde:"rgba(96,165,250,0.4)",prods:["Europeo","Persa","Slicer","Morron","Minibel"]},
  {id:"f4h",nombre:"Forrajera",icon:"[F]",color:"#4ade80",bg:"linear-gradient(135deg,#14532d,#16a34a)",borde:"rgba(74,222,128,0.4)",prods:["Persa","Morron","Minibel"]}
];

var PRODS_META={
  "Persa":{icon:"O",color:"#4ade80",bg:"rgba(74,222,128,0.08)",borde:"rgba(74,222,128,0.35)",sub:"Pepino Persa"},
  "Europeo":{icon:"O",color:"#34d399",bg:"rgba(52,211,153,0.08)",borde:"rgba(52,211,153,0.35)",sub:"Pepino Europeo"},
  "Slicer":{icon:"O",color:"#a3e635",bg:"rgba(163,230,53,0.08)",borde:"rgba(163,230,53,0.35)",sub:"Pepino Slicer"},
  "Minibel":{icon:"*",color:"#f472b6",bg:"rgba(244,114,182,0.08)",borde:"rgba(244,114,182,0.35)",sub:"Chile Minibel Mix"},
  "Morron":{icon:"!",color:"#f87171",bg:"rgba(248,113,113,0.08)",borde:"rgba(248,113,113,0.35)",sub:"Chile Morron"}
};

var COLORES_MORRON=[
  {id:"rojo",label:"Rojo",c:"#ef4444",bg:"rgba(239,68,68,0.15)",borde:"rgba(239,68,68,0.5)"},
  {id:"amarillo",label:"Amarillo",c:"#eab308",bg:"rgba(234,179,8,0.15)",borde:"rgba(234,179,8,0.5)"},
  {id:"naranja",label:"Naranja",c:"#f97316",bg:"rgba(249,115,22,0.15)",borde:"rgba(249,115,22,0.5)"},
  {id:"verde",label:"Verde",c:"#22c55e",bg:"rgba(34,197,94,0.15)",borde:"rgba(34,197,94,0.5)"}
];

var DIAS=["Viernes","Sabado","Domingo","Lunes","Martes","Miercoles","Jueves"];
var RANCHO_NOMBRES={pvt:"PVT",crp:"Cordillera",f4h:"Forrajera"};

function nv(v){var x=parseFloat(v);return isNaN(x)?0:x;}
function fmt(v,d){d=d===undefined?1:d;if(!isFinite(v)||isNaN(v))return "--";return v.toLocaleString("es-MX",{minimumFractionDigits:d,maximumFractionDigits:d});}

function fechaSemana(){
  var d=new Date();var dia=d.getDay();
  var diff=dia>=5?dia-5:dia+2;
  var ini=new Date(d);ini.setDate(d.getDate()-diff);
  return ini.toISOString().split("T")[0];
}
function sumDias(fecha,n){
  var d=new Date(fecha+"T12:00:00");d.setDate(d.getDate()+n);
  return d.toISOString().split("T")[0];
}
function numSemana(fechaStr){
  var d=new Date(fechaStr+"T12:00:00");
  var dia=d.getDay();
  var inicio=new Date(d);inicio.setDate(d.getDate()-((dia+3)%7));
  inicio.setHours(0,0,0,0);
  var ft=new Date(inicio.getFullYear(),0,4);
  var diff=inicio-ft;
  return Math.ceil((diff/(86400000*7)))+1;
}
function infoSemana(semIni){
  var d=new Date(semIni+"T12:00:00");
  var fin=new Date(d);fin.setDate(d.getDate()+6);
  var meses=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  var fD=function(dt){return dt.getDate()+" "+meses[dt.getMonth()];};
  return{num:numSemana(semIni),label:"Semana "+numSemana(semIni)+" . "+fD(d)+" al "+fD(fin)+" "+fin.getFullYear()};
}

function initProd(prod){if(prod==="Morron")return{rejas:"",colores:[]};return{rejas:""};}

function ModalPin(props){
  var s1=useState(""); var v=s1[0]; var sv=s1[1];
  var s2=useState(false); var err=s2[0]; var sErr=s2[1];
  function ok(){
    if(v===PIN_MAESTRO){sv("");sErr(false);props.onOk("maestro");return;}
    if(props.ranchoId&&PINS[props.ranchoId]&&v===PINS[props.ranchoId]){sv("");sErr(false);props.onOk(props.ranchoId);return;}
    sErr(true);sv("");
  }
  var rancho=props.ranchoId?RANCHOS.find(function(r){return r.id===props.ranchoId;}):null;
  return(
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.95)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#060d08",border:"2px solid rgba(74,222,128,0.4)",borderRadius:16,padding:28,maxWidth:320,width:"100%",textAlign:"center"}}>
        <div style={{fontSize:11,color:"#166534",fontWeight:800,letterSpacing:2,marginBottom:8}}>PARRAS VALLEY . CAMPO</div>
        {rancho&&<div style={{fontSize:22,fontWeight:900,color:rancho.color,marginBottom:4}}>{rancho.nombre}</div>}
        <div style={{fontSize:13,color:"#4a7a54",marginBottom:20}}>Ingresa tu PIN</div>
        <input type="password" value={v}
          onChange={function(e){sv(e.target.value);sErr(false);}}
          onKeyDown={function(e){if(e.key==="Enter")ok();}}
          placeholder="PIN"
          style={{width:"100%",background:"rgba(0,0,0,0.5)",border:"2px solid "+(err?"#ef5350":"rgba(74,222,128,0.4)"),borderRadius:10,padding:"14px",color:"#4ade80",fontFamily:"Georgia,serif",fontSize:28,textAlign:"center",outline:"none",marginBottom:err?8:18,letterSpacing:8}}
          autoFocus/>
        {err&&<div style={{fontSize:12,color:"#ef5350",marginBottom:12,fontWeight:700}}>PIN incorrecto</div>}
        <div style={{display:"flex",gap:10}}>
          <button onClick={props.onCancel} style={{flex:1,padding:"12px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,color:"#4a7a54",fontWeight:700,cursor:"pointer",fontFamily:"system-ui",fontSize:13}}>Cancelar</button>
          <button onClick={ok} style={{flex:1,padding:"12px",background:"linear-gradient(135deg,#14532d,#22c55e)",border:"none",borderRadius:10,color:"#fff",fontWeight:900,cursor:"pointer",fontFamily:"system-ui",fontSize:13}}>Entrar</button>
        </div>
      </div>
    </div>
  );
}

function App(){
  var s1=useState("captura"); var vista=s1[0]; var setVista=s1[1];
  var s2=useState(0); var diaIdx=s2[0]; var setDiaIdx=s2[1];
  var s3=useState(null); var ranchoId=s3[0]; var setRanchoId=s3[1];
  var s4=useState({}); var datos=s4[0]; var setDatos=s4[1];
  var s5=useState(false); var guardado=s5[0]; var setGuardado=s5[1];
  var s6=useState(false); var carg=s6[0]; var setCarg=s6[1];
  var s7=useState(null); var pinTarget=s7[0]; var setPinTarget=s7[1];
  var s8=useState(false); var esMaestro=s8[0]; var setEsMaestro=s8[1];
  var s9=useState(null); var editModal=s9[0]; var setEditModal=s9[1];
  var s10=useState(false); var showPinEdit=s10[0]; var setShowPinEdit=s10[1];
  var s11=useState({}); var semGuardada=s11[0]; var setSemGuardada=s11[1];
  var s12=useState({}); var ajustes=s12[0]; var setAjustes=s12[1];
  var s13=useState(false); var semBloq=s13[0]; var setSemBloq=s13[1];
  var s14=useState(false); var guardandoSem=s14[0]; var setGuardandoSem=s14[1];
  var s15=useState({}); var qcData=s15[0]; var setQcData=s15[1];
  var s16=useState(fechaSemana()); var semSel=s16[0]; var setSemSel=s16[1];
  var semIni=semSel;

  useEffect(function(){
    setCarg(true);
    fbGet(FB,function(d){
      if(d&&typeof d==="object")setDatos(d);
      fbGet(FB_SEM,function(ds){
        if(ds&&typeof ds==="object")setSemGuardada(ds);
        fbGet(FB_AJU,function(da){
          if(da&&typeof da==="object")setAjustes(da);
          fbGet(FB_QCR,function(dq){
            if(dq&&Array.isArray(dq))setQcData(dq);
            setCarg(false);
          });
        });
      });
    });
  },[]);

  function getKey(rid,di){return semIni+"|"+rid+"|"+di;}
  function getProd(rid,di,prod){return (datos[getKey(rid,di)]||{})[prod]||initProd(prod);}

  var rancho=RANCHOS.find(function(r){return r.id===ranchoId;})||RANCHOS[0];

  function setProdField(prod,tipoOrg,field,val){
    var k=getKey(ranchoId,diaIdx);
    var nd=JSON.parse(JSON.stringify(datos));
    if(!nd[k])nd[k]={};
    if(!nd[k][prod])nd[k][prod]=initProd(prod);
    if(!nd[k][prod][tipoOrg])nd[k][prod][tipoOrg]={rejas:""};
    nd[k][prod][tipoOrg][field]=val;
    setDatos(nd);fbSet(nd);
  }

  function setProdTipo(prod,val){
    var k=getKey(ranchoId,diaIdx);
    var nd=JSON.parse(JSON.stringify(datos));
    if(!nd[k])nd[k]={};
    if(!nd[k][prod])nd[k][prod]=initProd(prod);
    nd[k][prod].tipo=val;
    setDatos(nd);fbSet(nd);
  }
  function setMorronColor(colorId,tipoOrg,field,val){
    var k=getKey(ranchoId,diaIdx);
    var nd=JSON.parse(JSON.stringify(datos));
    if(!nd[k])nd[k]={};
    if(!nd[k].Morron)nd[k].Morron=initProd("Morron");
    var cols=(nd[k].Morron[tipoOrg]||{colores:[]}).colores||[];
    var idx=cols.findIndex(function(c){return c.id===colorId;});
    if(idx>=0)cols[idx][field]=val;
    if(!nd[k].Morron[tipoOrg])nd[k].Morron[tipoOrg]={colores:[]};
    nd[k].Morron[tipoOrg].colores=cols;
    setDatos(nd);fbSet(nd);
  }

  function addColor(tipoOrg,colorId){
    var k=getKey(ranchoId,diaIdx);
    var nd=JSON.parse(JSON.stringify(datos));
    if(!nd[k])nd[k]={};
    if(!nd[k].Morron)nd[k].Morron=initProd("Morron");
    if(!nd[k].Morron[tipoOrg])nd[k].Morron[tipoOrg]={colores:[]};
    var cols=nd[k].Morron[tipoOrg].colores||[];
    if(!cols.find(function(c){return c.id===colorId;}))cols.push({id:colorId,rejas:""});
    nd[k].Morron[tipoOrg].colores=cols;
    setDatos(nd);fbSet(nd);
  }

  function delColor(tipoOrg,colorId){
    var k=getKey(ranchoId,diaIdx);
    var nd=JSON.parse(JSON.stringify(datos));
    if(!nd[k]||!nd[k].Morron)return;
    if(!nd[k].Morron[tipoOrg])return;
    nd[k].Morron[tipoOrg].colores=(nd[k].Morron[tipoOrg].colores||[]).filter(function(c){return c.id!==colorId;});
    setDatos(nd);fbSet(nd);
  }

  var diasConDatos=DIAS.map(function(d,i){
    var k=getKey(ranchoId,i);return datos[k]&&Object.keys(datos[k]).length>0;
  });

  var totalRejas=rancho.prods.reduce(function(s,prod){
    var p=getProd(ranchoId,diaIdx,prod);
    if(prod==="Morron"){
      var orgR=(p.org&&p.org.colores||[]).reduce(function(ss,c){return ss+nv(c.rejas);},0);
      var convR=(p.conv&&p.conv.colores||[]).reduce(function(ss,c){return ss+nv(c.rejas);},0);
      return s+orgR+convR;
    }
    var orgR2=nv(p.org&&p.org.rejas||0);
    var convR2=nv(p.conv&&p.conv.rejas||0);
    return s+orgR2+convR2;
  },0);

  // Sin rancho autenticado -> pantalla de seleccion
  if(!ranchoId){
    return(
      <div style={{background:"#060d08",minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
        {pinTarget&&<ModalPin ranchoId={pinTarget==="maestro"?null:pinTarget} onOk={function(rid){
          if(rid==="maestro"){setEsMaestro(true);setRanchoId(RANCHOS[0].id);}
          else{setEsMaestro(false);setRanchoId(rid);}
          setPinTarget(null);
        }} onCancel={function(){setPinTarget(null);}}/>}
        <div style={{textAlign:"center",marginBottom:32}}>

  function abrirEditor(rid,di,prod,tipo,colorId){
    if(esMaestro){
      setEditModal({rid:rid,di:di,prod:prod,tipo:tipo,colorId:colorId,val:""});
    } else {
      setEditModal({rid:rid,di:di,prod:prod,tipo:tipo,colorId:colorId,val:"",pendiente:true});
      setShowPinEdit(true);
    }
  }

  function guardarEdit(val){
    if(!editModal)return;
    if(editModal.esAjuste){
      guardarAjuste(editModal.rid,editModal.di,editModal.prod,editModal.tipo,editModal.colorId,val);
      setEditModal(null);return;
    }
    var nd=JSON.parse(JSON.stringify(datos));
    var k=getKey(editModal.rid,editModal.di);
    if(!nd[k])nd[k]={};
    if(editModal.prod==="Morron"){
      if(!nd[k].Morron)nd[k].Morron={rejas:"",colores:[]};
      if(!nd[k].Morron[editModal.tipo])nd[k].Morron[editModal.tipo]={colores:[]};
      var cols=nd[k].Morron[editModal.tipo].colores||[];
      var idx=cols.findIndex(function(c){return c.id===editModal.colorId;});
      if(idx>=0)cols[idx].rejas=val; else cols.push({id:editModal.colorId,rejas:val});
      nd[k].Morron[editModal.tipo].colores=cols;
    } else {
      if(!nd[k][editModal.prod])nd[k][editModal.prod]={tipo:"ambos",org:{rejas:""},conv:{rejas:""}};
      if(!nd[k][editModal.prod][editModal.tipo])nd[k][editModal.prod][editModal.tipo]={rejas:""};
      nd[k][editModal.prod][editModal.tipo].rejas=val;
    }
    setDatos(nd);fbSet(nd);setEditModal(null);
  }

  // Mapa rancho campo -> rancho recibo
  var RANCHO_MAP2={pvt:["PVT"],crp:["CRP","Cordillera","Cordillera Real de Parras"],f4h:["Forrajera","F4H"]};
  var claveRancho=semIni+"_"+(ranchoId||"");
  var semYaGuardada=!!(semGuardada&&semGuardada[claveRancho]);

  function guardarSemana(){
    if(!ranchoId)return;
    setGuardandoSem(true);
    var snap={rancho:ranchoId,semIni:semIni,fechaGuardado:new Date().toISOString(),dias:{}};
    DIAS.forEach(function(d,i){snap.dias[i]=datos[getKey(ranchoId,i)]||{};});
    var url="https://parrasvalley-default-rtdb.firebaseio.com/campo-proy-semanas-v1/"+claveRancho+".json";
    fetch(url,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(snap)})
      .then(function(){
        var ns=Object.assign({},semGuardada);ns[claveRancho]=snap;setSemGuardada(ns);
        setSemBloq(true);setGuardandoSem(false);setGuardado(true);
        setTimeout(function(){setGuardado(false);},3000);
      }).catch(function(){setGuardandoSem(false);});
  }

  function guardarAjuste(rid,di,prod,tipo,colorId,val){
    var clave=semIni+"_"+rid+"_"+di+"_"+prod+"_"+tipo+(colorId?"_"+colorId:"");
    var snap={rancho:rid,di:di,prod:prod,tipo:tipo,colorId:colorId||null,rejas:val,fecha:new Date().toISOString()};
    var url="https://parrasvalley-default-rtdb.firebaseio.com/campo-proy-ajustes-v1/"+clave+".json";
    fetch(url,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(snap)})
      .then(function(){var na=Object.assign({},ajustes);na[clave]=snap;setAjustes(na);});
  }

  function getProyOriginal(rid,di,prod,tipo,colorId){
    var sg=semGuardada&&semGuardada[semIni+"_"+rid];
    if(!sg||!sg.dias||!sg.dias[di])return null;
    var dx=sg.dias[di];
    if(prod==="Morron"){
      var cols=(dx.Morron&&dx.Morron[tipo]&&dx.Morron[tipo].colores)||[];
      var ca=cols.find(function(c){return c.id===colorId;});return ca?nv(ca.rejas):null;
    }
    return dx[prod]&&dx[prod][tipo]?nv(dx[prod][tipo].rejas||0):null;
  }

  function getAjuste(rid,di,prod,tipo,colorId){
    var clave=semIni+"_"+rid+"_"+di+"_"+prod+"_"+tipo+(colorId?"_"+colorId:"");
    return ajustes&&ajustes[clave]?nv(ajustes[clave].rejas):null;
  }

  function jalarRecibo(){
    setCarg(true);
    fetch(FB_QCR).then(function(r){return r.json();}).then(function(d){
      var arr=d&&Array.isArray(d)?d:(d&&typeof d==="object"?Object.values(d):[]);
      setQcData(arr);setCarg(false);
    }).catch(function(){setCarg(false);});
  }

  function getRejasRecibo(rid,di){
    if(!qcData||!qcData.length)return null;
    var ranchoNombres=RANCHO_MAP2[rid]||[];
    var offsets=[-1,0,1,2,3,4,5];
    var base=new Date(semIni);var d2=new Date(base);d2.setDate(base.getDate()+offsets[di]);
    var fechaBusc=d2.toLocaleDateString("es-MX",{day:"2-digit",month:"2-digit",year:"numeric"});
    var total=0;var tiene=false;
    qcData.forEach(function(h){
      if(!h||!h.fecha||h.fecha!==fechaBusc)return;
      ranchoNombres.forEach(function(rn){
        if((h.rancho||"").toLowerCase()===rn.toLowerCase()){tiene=true;total+=nv(h.rejas||0);}
      });
    });
    return tiene?total:null;
  }

                                <td>
                                  <span style={{color:meta.color,fontWeight:800}}>{meta.icon} {prod}</span>
                                  <span style={{color:etiq,fontSize:9,marginLeft:6,fontWeight:900}}>{tk==="org"?"ORG":"CONV"}</span>
                                </td>
                                {vals.map(function(v,i){return(
                                  <td key={i} style={{color:v>0?etiq:"rgba(255,255,255,0.12)",fontWeight:v>0?800:400,cursor:esMaestro?"pointer":"default"}} onClick={esMaestro?function(){abrirEditor(r.id,i,prod,tk,null);}:undefined}>
                                    {v>0?fmt(v,0):"--"}
                                    {esMaestro&&<div style={{fontSize:7,color:etiq,opacity:0.45,marginTop:1}}>editar</div>}
                                  </td>
                                );})}
                                <td style={{color:etiq,fontWeight:900}}>{fmt(total,0)}</td>
                              </tr>
                            );
                          });
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              );
            })}
            {!RANCHOS.some(function(r){return DIAS.some(function(d,i){return r.prods.some(function(prod){var p=getProd(r.id,i,prod);if(prod==="Morron")return ["org","conv"].some(function(tk){return ((p[tk]&&p[tk].colores)||[]).some(function(c){return nv(c.rejas)>0;});});return nv((p.org&&p.org.rejas)||0)>0||nv((p.conv&&p.conv.rejas)||0)>0;});});})&&(
              <div style={{textAlign:"center",padding:60,color:"#4a7a54",fontSize:15}}>Sin proyecciones esta semana</div>
            )}
          </div>
        )}

        {/* Modal PIN para editar */}
        {showPinEdit&&(
          <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.92)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
            <div style={{background:"#060d08",border:"2px solid rgba(251,191,36,0.4)",borderRadius:14,padding:24,maxWidth:300,width:"100%",textAlign:"center"}}>
              <div style={{fontSize:13,color:"#fbbf24",fontWeight:700,marginBottom:16}}>PIN maestro para editar</div>
              <input id="pin-edit-inp" type="password" autoFocus placeholder="PIN"
                style={{width:"100%",background:"rgba(0,0,0,0.5)",border:"2px solid rgba(251,191,36,0.4)",borderRadius:9,padding:"12px",color:"#fbbf24",fontFamily:"Georgia,serif",fontSize:24,textAlign:"center",outline:"none",marginBottom:14,letterSpacing:6}}/>
              <div style={{display:"flex",gap:10}}>
                <button onClick={function(){setShowPinEdit(false);setEditModal(null);}} style={{flex:1,padding:"10px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#6b7280",cursor:"pointer",fontFamily:"system-ui"}}>Cancelar</button>
                <button onClick={function(){
                  var el=document.getElementById("pin-edit-inp");
                  if(el&&el.value===PIN_MAESTRO){setEsMaestro(true);setShowPinEdit(false);setEditModal(function(em){return em?Object.assign({},em,{pendiente:false}):em;});}
                  else if(el){el.value="";}
                }} style={{flex:1,padding:"10px",background:"rgba(251,191,36,0.15)",border:"2px solid rgba(251,191,36,0.4)",borderRadius:8,color:"#fbbf24",fontWeight:900,cursor:"pointer",fontFamily:"system-ui"}}>Entrar</button>
              </div>
            </div>
          </div>
        )}

        {/* Modal editar rejas */}
        {editModal&&!editModal.pendiente&&(
          <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.92)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
            <div style={{background:"#060d08",border:"2px solid rgba(74,222,128,0.4)",borderRadius:14,padding:24,maxWidth:320,width:"100%"}}>
              <div style={{fontSize:15,fontWeight:900,color:"#4ade80",marginBottom:4}}>Editar rejas</div>
              <div style={{fontSize:11,color:"#4a7a54",marginBottom:16}}>
                {RANCHO_NOMBRES[editModal.rid]} . {editModal.prod}{editModal.colorId?" "+editModal.colorId:""} . {editModal.tipo==="org"?"Org":"Conv"} . {DIAS[editModal.di]}
              </div>
              <input id="edit-inp" type="number" min="0" autoFocus placeholder="Rejas"
                defaultValue={(function(){
                  var k=getKey(editModal.rid,editModal.di);var dx=datos[k];if(!dx)return "";
                  if(editModal.prod==="Morron"){
                    var cols=(dx.Morron&&dx.Morron[editModal.tipo]&&dx.Morron[editModal.tipo].colores)||[];
                    var ca=cols.find(function(c){return c.id===editModal.colorId;});
                    return ca?ca.rejas:"";
                  }
                  return(dx[editModal.prod]&&dx[editModal.prod][editModal.tipo]&&dx[editModal.prod][editModal.tipo].rejas)||"";
                })()}
                style={{width:"100%",background:"rgba(0,0,0,0.4)",border:"2px solid rgba(74,222,128,0.4)",borderRadius:9,padding:"13px",color:"#4ade80",fontFamily:"system-ui",fontSize:24,fontWeight:900,textAlign:"center",outline:"none",marginBottom:16}}/>
              <div style={{display:"flex",gap:10}}>
                <button onClick={function(){setEditModal(null);}} style={{flex:1,padding:"11px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,color:"#6b7280",cursor:"pointer",fontFamily:"system-ui"}}>Cancelar</button>
                <button onClick={function(){var el=document.getElementById("edit-inp");if(el)guardarEdit(el.value);}} style={{flex:2,padding:"11px",background:"rgba(74,222,128,0.15)",border:"2px solid rgba(74,222,128,0.4)",borderRadius:9,color:"#4ade80",fontWeight:900,cursor:"pointer",fontFamily:"system-ui"}}>Guardar</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
